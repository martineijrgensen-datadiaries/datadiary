title: DataDiary
description: Field notes from the data trenches — CJA, AEP, and beyond.
author: martineijrgensen
url: "https://datadiary.dk"
baseurl: ""

# Build
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .sass-cache

# Tags
tag_colors:
  CJA: coral
  AEP: lime
  "Field Notes": sky
