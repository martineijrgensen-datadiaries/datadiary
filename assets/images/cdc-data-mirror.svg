  <text x="418" y="186" font-size="10" fill="#8A8799">13:10</text>
  <rect x="460" y="172" width="58" height="18" rx="5" fill="#F5A623"/>
  <text x="489" y="185" text-anchor="middle" font-size="10" font-weight="700" fill="#1C1A2A">UPDATE</text>
  <text x="526" y="186" font-size="11" fill="#1C1A2A">#101  status → shipped</text>

  <!-- 11:20 UPDATE #102 shipped -->
  <text x="418" y="220" font-size="10" fill="#8A8799">11:20</text>
  <rect x="460" y="206" width="58" height="18" rx="5" fill="#F5A623"/>
  <text x="489" y="219" text-anchor="middle" font-size="10" font-weight="700" fill="#1C1A2A">UPDATE</text>
