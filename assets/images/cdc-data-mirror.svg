  <rect x="832" y="450" width="394" height="30" rx="8" fill="#EDF9E6"/>
  <text x="852" y="470" font-size="12" fill="#4CAF7D">✓  Deletions propagate automatically</text>

  <rect x="832" y="486" width="394" height="30" rx="8" fill="#EDF9E6"/>
  <text x="852" y="506" font-size="12" fill="#4CAF7D">✓  No custom ETL required</text>

