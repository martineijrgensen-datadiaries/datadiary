  <!-- 08:10 INSERT #103 -->
  <text x="418" y="424" font-size="10" fill="#8A8799">08:10</text>
  <rect x="460" y="410" width="52" height="18" rx="5" fill="#4CAF7D"/>
  <text x="486" y="423" text-anchor="middle" font-size="10" font-weight="700" fill="white">INSERT</text>
  <text x="520" y="424" font-size="11" fill="#1C1A2A">#103  status = placed</text>

  <!-- 08:02 INSERT #102 -->
  <text x="418" y="458" font-size="10" fill="#8A8799">08:02</text>
