  <rect x="411" y="508" width="294" height="34" rx="10" fill="#F7F3EA" stroke="#D4CEBC" stroke-width="1.5"/>
  <text x="558" y="529" text-anchor="middle" font-size="12" fill="#8A8799">📓  complete history of every change</text>

