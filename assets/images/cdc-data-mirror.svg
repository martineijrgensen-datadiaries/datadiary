  <text x="486" y="457" text-anchor="middle" font-size="10" font-weight="700" fill="white">INSERT</text>
  <text x="520" y="458" font-size="11" fill="#1C1A2A">#102  status = placed</text>

  <!-- 07:41 INSERT #101 -->
  <text x="418" y="492" font-size="10" fill="#8A8799">07:41</text>
  <rect x="460" y="478" width="52" height="18" rx="5" fill="#4CAF7D"/>
  <text x="486" y="491" text-anchor="middle" font-size="10" font-weight="700" fill="white">INSERT</text>
  <text x="520" y="492" font-size="11" fill="#1C1A2A">#101  status = placed</text>

