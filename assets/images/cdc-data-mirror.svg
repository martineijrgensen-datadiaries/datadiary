  <text x="418" y="356" font-size="10" fill="#8A8799">09:12</text>
  <rect x="460" y="342" width="52" height="18" rx="5" fill="#4CAF7D"/>
  <text x="486" y="355" text-anchor="middle" font-size="10" font-weight="700" fill="white">INSERT</text>
  <text x="520" y="356" font-size="11" fill="#1C1A2A">#104  status = placed</text>

