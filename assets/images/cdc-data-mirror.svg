<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 740" width="1280" height="740" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#C4BEAA" flood-opacity="1"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#C4BEAA" flood-opacity="1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="740" fill="#F7F3EA"/>

  <!-- ── HEADER ──────────────────────────────────────────── -->
  <rect x="0" y="0" width="1280" height="58" fill="#1C1A2A" rx="0"/>
  <text x="640" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="white" dy="0.35em">Change Data Capture · How Data Mirror works</text>

  <!-- ── COLUMN LABELS ───────────────────────────────────── -->
  <text x="190" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#8A8799" letter-spacing="1.5">SOURCE SYSTEM</text>
  <text x="540" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#8A8799" letter-spacing="1.5">CHANGE LOG</text>
  <text x="1005" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#8A8799" letter-spacing="1.5">AEP DATA LAKE</text>

  <!-- ══════════════════════════════════════════════════════
       BOX 1 — Source System
  ══════════════════════════════════════════════════════════ -->
  <rect x="45" y="96" width="290" height="560" rx="14" fill="#C4BEAA" filter="none"/>
  <rect x="40" y="91" width="290" height="560" rx="14" fill="#FDFAF4" stroke="#1C1A2A" stroke-width="2.5"/>

  <!-- box 1 header -->
  <rect x="40" y="91" width="290" height="40" rx="14" fill="#1C1A2A"/>
  <rect x="40" y="111" width="290" height="20" fill="#1C1A2A"/>
  <text x="185" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="white">orders_table</text>

  <!-- column headers -->
  <text x="58" y="148" font-size="10" fill="#8A8799">order_id</text>
  <text x="148" y="148" font-size="10" fill="#8A8799">status</text>
  <text x="248" y="148" font-size="10" fill="#8A8799">updated_at</text>
  <line x1="52" y1="156" x2="318" y2="156" stroke="#D4CEBC" stroke-width="1"/>

  <!-- row 1 — returned (highlight) -->
  <rect x="44" y="160" width="282" height="24" rx="4" fill="#FDECEA"/>
  <text x="58" y="176" font-size="12" fill="#1C1A2A">#101</text>
  <text x="148" y="176" font-size="12" fill="#E84747">returned</text>
  <text x="248" y="176" font-size="12" fill="#8A8799">14:33</text>

  <!-- row 2 -->
  <rect x="44" y="188" width="282" height="24" rx="4" fill="#EAF4FD"/>
  <text x="58" y="204" font-size="12" fill="#1C1A2A">#102</text>
  <text x="148" y="204" font-size="12" fill="#7BBFD4">shipped</text>
  <text x="248" y="204" font-size="12" fill="#8A8799">11:20</text>

  <!-- row 3 -->
  <rect x="44" y="216" width="282" height="24" rx="4" fill="#EDF9E6"/>
  <text x="58" y="232" font-size="12" fill="#1C1A2A">#103</text>
  <text x="148" y="232" font-size="12" fill="#4CAF7D">confirmed</text>
  <text x="248" y="232" font-size="12" fill="#8A8799">09:55</text>

  <!-- row 4 -->
  <rect x="44" y="244" width="282" height="24" rx="4" fill="#FFFBEA"/>
  <text x="58" y="260" font-size="12" fill="#1C1A2A">#104</text>
  <text x="148" y="260" font-size="12" fill="#F5A623">placed</text>
  <text x="248" y="260" font-size="12" fill="#8A8799">08:10</text>

  <!-- row 5 -->
  <rect x="44" y="272" width="282" height="24" rx="4" fill="#FFFBEA"/>
  <text x="58" y="288" font-size="12" fill="#1C1A2A">#105</text>
  <text x="148" y="288" font-size="12" fill="#F5A623">placed</text>
  <text x="248" y="288" font-size="12" fill="#8A8799">08:02</text>

