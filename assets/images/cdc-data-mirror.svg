  <rect x="832" y="378" width="394" height="30" rx="8" fill="#EDF9E6"/>
  <text x="852" y="398" font-size="12" fill="#4CAF7D">✓  One row per order — no duplicates</text>

  <rect x="832" y="414" width="394" height="30" rx="8" fill="#EDF9E6"/>
