  <text x="58" y="318" font-size="11" fill="#8A8799">↑  rows update in place</text>

  <!-- cute divider -->
  <line x1="60" y1="332" x2="310" y2="332" stroke="#D4CEBC" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- what batch misses -->
  <text x="58" y="358" font-size="13" font-weight="600" fill="#1C1A2A">What batch ingestion misses:</text>

  <rect x="52" y="368" width="270" height="30" rx="8" fill="#FDECEA"/>
  <text x="68" y="388" font-size="12" fill="#E84747">✗  Returns and cancellations</text>

  <rect x="52" y="404" width="270" height="30" rx="8" fill="#FDECEA"/>
  <text x="68" y="424" font-size="12" fill="#E84747">✗  Status changes mid-day</text>

  <rect x="52" y="440" width="270" height="30" rx="8" fill="#FDECEA"/>
  <text x="68" y="460" font-size="12" fill="#E84747">✗  Deleted rows stay forever</text>

  <!-- photo metaphor note -->
  <rect x="44" y="492" width="282" height="56" rx="10" fill="#F7F3EA" stroke="#D4CEBC" stroke-width="1.5"/>
  <text x="185" y="514" text-anchor="middle" font-size="13" fill="#8A8799">📸  taken at 2am</text>
  <text x="185" y="534" text-anchor="middle" font-size="12" fill="#8A8799">stale for the rest of the day</text>

  <!-- ══════════════════════════════════════════════════════
       ARROW — Source → Change Log
  ══════════════════════════════════════════════════════════ -->
  <line x1="336" y1="360" x2="388" y2="360" stroke="#E86A47" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="388,354 400,360 388,366" fill="#E86A47"/>
  <text x="362" y="348" text-anchor="middle" font-size="10" fill="#E86A47" font-weight="600">mutations</text>
  <text x="362" y="376" text-anchor="middle" font-size="10" fill="#E86A47" font-weight="600">tracked →</text>

  <!-- ══════════════════════════════════════════════════════
       BOX 2 — Change Log
  ══════════════════════════════════════════════════════════ -->
  <rect x="408" y="96" width="310" height="560" rx="14" fill="#C4BEAA"/>
  <rect x="403" y="91" width="310" height="560" rx="14" fill="#FDFAF4" stroke="#1C1A2A" stroke-width="2.5"/>

