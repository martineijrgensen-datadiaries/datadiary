  <text x="489" y="151" text-anchor="middle" font-size="10" font-weight="700" fill="#1C1A2A">UPDATE</text>
  <text x="526" y="152" font-size="11" fill="#1C1A2A">#101  status → <tspan font-weight="700" fill="#E84747">returned</tspan></text>

