  <text x="1090" y="229" font-size="12" fill="#8A8799">11:20</text>

  <!-- aep row 3 -->
  <rect x="827" y="242" width="402" height="26" rx="5" fill="#EDF9E6"/>
  <text x="848" y="259" font-size="12" fill="#1C1A2A">#103</text>
  <text x="950" y="259" font-size="12" fill="#4CAF7D">confirmed</text>
  <text x="1090" y="259" font-size="12" fill="#8A8799">09:55</text>

  <!-- aep row 4 -->
  <rect x="827" y="272" width="402" height="26" rx="5" fill="#FFFBEA"/>
  <text x="848" y="289" font-size="12" fill="#1C1A2A">#104</text>
  <text x="950" y="289" font-size="12" fill="#F5A623">placed</text>
  <text x="1090" y="289" font-size="12" fill="#8A8799">08:10</text>

  <!-- aep row 5 -->
  <rect x="827" y="302" width="402" height="26" rx="5" fill="#FFFBEA"/>
  <text x="848" y="319" font-size="12" fill="#1C1A2A">#105</text>
  <text x="950" y="319" font-size="12" fill="#F5A623">placed</text>
  <text x="1090" y="319" font-size="12" fill="#8A8799">08:02</text>

  <!-- cute divider -->
  <line x1="840" y1="342" x2="1220" y2="342" stroke="#D4CEBC" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- checkmarks -->
