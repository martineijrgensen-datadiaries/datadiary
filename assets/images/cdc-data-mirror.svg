  <text x="558" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="white">change_log  (CDC)</text>

  <!-- log entries -->
  <!-- entry helper: time | badge | description -->

  <!-- 14:33 UPDATE #101 returned -->
  <text x="418" y="152" font-size="10" fill="#8A8799">14:33</text>
