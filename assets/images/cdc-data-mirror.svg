       DATA MIRROR PILL
  ══════════════════════════════════════════════════════════ -->
  <rect x="725" y="318" width="90" height="82" rx="14" fill="#1C1A2A" filter="url(#shadow-sm)"/>
  <text x="770" y="348" text-anchor="middle" font-size="14" font-weight="700" fill="white">Data</text>
